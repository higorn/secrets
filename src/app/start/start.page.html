<ion-content [fullscreen]="false">
  <div class="ion-padding-top">
    <div class="ion-text-center ion-padding-top">
      <h1><ion-icon name="lock-closed" class="ion-padding-vertical"></ion-icon></h1>
      <p class="ion-padding-horizontal ion-padding-vertical">
        <ion-text><h4>{{ 'message' | translate }}</h4></ion-text>
      </p>
    </div>
    <form (ngSubmit)="unseal()">
      <ion-item>
        <ion-label position="floating">Password</ion-label>
        <ion-input [type]="pwType" name="password" [(ngModel)]="password" autocomplete="password" autofocus="true"></ion-input>
        <ion-icon slot="end" name="eye" (click)="showSecret()"></ion-icon>
      </ion-item>
      <p class="ion-padding-horizontal">
        <ion-button type="submit" expand="block" [disabled]="!password">unseal</ion-button>
      </p>
    </form>
  </div>
</ion-content>
