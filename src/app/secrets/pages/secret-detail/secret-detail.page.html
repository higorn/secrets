<ion-nav *ngIf="isAdd; else detail" [root]="rootPage"></ion-nav>
<ng-template #detail>
  <ion-header [translucent]="true">
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-back-button></ion-back-button>
      </ion-buttons>
      <ion-title>
        Add secret
      </ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content [fullscreen]="false">

    <form [formGroup]="form" (ngSubmit)="save()">
      <ion-item>
        <ion-label position="floating">Name</ion-label>
        <ion-input formControlName="name" autofocus="true"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="floating">User</ion-label>
        <ion-input formControlName="user" autocomplete="email|useranme"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label position="floating">Password</ion-label>
        <ion-input formControlName="password" [type]="pwType" autocomplete="password"></ion-input>
        <ion-icon slot="end" name="eye" (click)="showSecret()"></ion-icon>
      </ion-item>
      <p class="ion-padding-start ion-padding-end">
        <ion-button type="submit" expand="block" [disabled]="form.invalid">Save</ion-button>
      </p>
    </form>
  </ion-content>
</ng-template>
