<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button *ngIf="isReadonly" id="remove-btn" (click)="remove()">
        <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>
      {{title}}
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="false">

  <form [formGroup]="form" (ngSubmit)="save()">

    <ion-item *ngFor="let f of fields">

  <!--
      <ion-label position="floating">{{f.options.label}}</ion-label>
  -->
      <ion-label [position]="f.options.labelPosition || 'fixed'">{{f.options.label}}</ion-label>
      <div [ngSwitch]="f.type">
        <ion-input *ngSwitchCase="'input'" [formControlName]="f.name"
                   [type]="f.options.type"
                   [autofocus]="f.options.autofocus"
                   [autocomplete]="f.options.autocomplete"
                   [readonly]="isReadonly" slot="end">
                   </ion-input>
        <ion-datetime *ngSwitchCase="'date'" [formControlName]="f.name"
                      [displayFormat]="f.options.format"
                      [min]="f.options.min"
                      [max]="f.options.max"
                      [readonly]="isReadonly"></ion-datetime>

      </div>
      <ion-icon *ngIf="f.secret" slot="end" name="eye" (click)="showSecret(f)"></ion-icon>
    </ion-item>
    <p *ngIf="isReadonly" class="ion-padding-start ion-padding-end">
      <ion-button type="button" expand="block" (click)="isReadonly = !isReadonly">Edit</ion-button>
    </p>
    <p *ngIf="!isReadonly" class="ion-padding-start ion-padding-end">
      <ion-button type="submit" expand="block" [disabled]="form.invalid">Save</ion-button>
    </p>
  </form>
</ion-content>
