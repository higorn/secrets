<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      My secrets
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list lines="full">
    <ion-item *ngFor="let s of secrets | async" [routerLink]="['/tabs/secrets', s.id]" detail>
      <ion-icon slot="start" [name]="getIcon(s.type)"></ion-icon>
      <ion-label>{{s.name}}</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
