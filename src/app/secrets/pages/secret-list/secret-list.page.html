<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      My secrets
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">My secrets</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list lines="full">
    <ion-item *ngFor="let s of secrets">
      <ion-icon slot="start" name="key"></ion-icon>
      <ion-label>{{s.name}}</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
