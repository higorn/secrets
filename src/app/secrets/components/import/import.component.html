<ion-header translucent>
  <ion-toolbar>
    <ion-title>{{ 'secrets.import.title' | translate }}</ion-title>
    <ion-buttons slot="start">
      <ion-button (click)="cancel()"><ion-icon name="close-outline"></ion-icon></ion-button>
    </ion-buttons>
    <ion-buttons *ngIf="secrets.length" slot="end">
      <ion-button (click)="import()">{{ 'secrets.import.import-btn' | translate }}</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>
  <div *ngIf="secrets.length === 0" class="center">
    <ion-text>{{ 'secrets.import.nothing' | translate }}</ion-text>
  </div>
  <ion-list *ngIf="secrets.length" lines="full">
    <ion-virtual-scroll [items]="secrets">
      <ion-item *virtualItem="let s">
        <ion-icon slot="start" name="globe-outline"></ion-icon>
        <ion-label>{{ s.name }}</ion-label>
        <ion-checkbox slot="end" [(ngModel)]="s.imported"></ion-checkbox>
      </ion-item>
    </ion-virtual-scroll>
  </ion-list>
</ion-content>
