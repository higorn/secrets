<ion-fab horizontal="center" vertical="bottom" slot="fixed">
  <ion-fab-button>
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>
  <ion-fab-list side="top">
    <ion-fab-button (click)="onClick('password')" color="light" title="{{ 'secrets.add.password' | translate }}">
      <ion-icon name="key-outline"></ion-icon>
    </ion-fab-button>
    <ion-fab-button (click)="onClick('card')" color="light" title="{{ 'secrets.add.card' | translate }}">
      <ion-icon name="card-outline"></ion-icon>
    </ion-fab-button>
    <ion-fab-button (click)="onClick('bank')" color="light" title="{{ 'secrets.add.bank' | translate }}">
      <ion-icon name="cash-outline"></ion-icon>
    </ion-fab-button>
    <ion-fab-button (click)="onClick('identity')" color="light" title="{{ 'secrets.add.identity' | translate }}">
      <ion-icon name="id-card-outline"></ion-icon>
    </ion-fab-button>
    <ion-fab-button (click)="onClick('info')" color="light" title="{{ 'secrets.add.info' | translate }}">
      <ion-icon name="person-circle-outline"></ion-icon>
    </ion-fab-button>
    <ion-fab-button (click)="onClick('note')" color="light" title="{{ 'secrets.add.note' | translate }}">
      <ion-icon name="document-lock-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab-list>
</ion-fab>
