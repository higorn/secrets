<ion-fab horizontal="center" vertical="bottom" slot="fixed">
  <ion-fab-button>
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>
  <ion-fab-list side="top">
    <ion-fab-button (click)="onClick('login')" color="light" data-desc="Login">
      <ion-icon name="log-in-outline"></ion-icon>
    </ion-fab-button>
    <ion-fab-button (click)="onClick('card')" color="light" data-desc="Card">
      <ion-icon name="card-outline"></ion-icon>
    </ion-fab-button>
    <ion-fab-button (click)="onClick('bank')" color="light" data-desc="Bank account">
      <ion-icon name="cash-outline"></ion-icon>
    </ion-fab-button>
    <ion-fab-button (click)="onClick('identity')" color="light" data-desc="Identity">
      <ion-icon name="id-card-outline"></ion-icon>
    </ion-fab-button>
    <ion-fab-button (click)="onClick('pin')" color="light" data-desc="PIN">
      <ion-icon name="key"></ion-icon>
    </ion-fab-button>
  </ion-fab-list>
</ion-fab>
