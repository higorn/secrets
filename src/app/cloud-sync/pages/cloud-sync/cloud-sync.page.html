<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>{{ 'cloud-sync.title' | translate }}</ion-title>
    <ion-buttons *ngIf="op !== 'restore'" slot="end">
      <ion-button (click)="skip()">{{ 'cloud-sync.skip-btn' | translate }}</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-radio-group [(ngModel)]="provider" (click)="select()">
    <ion-item lines="full">
      <ion-thumbnail slot="start">
        <ion-img src="assets/img/gdrive.png"></ion-img>
      </ion-thumbnail>
      <ion-label>Google Drive</ion-label>
      <ion-radio color="secondary" slot="end" value="google-drive"></ion-radio>
    </ion-item>
    <ion-item *ngIf="op !== 'restore'">
      <ion-thumbnail slot="start">
        <ion-img src="assets/img/ban.png"></ion-img>
      </ion-thumbnail>
      <ion-label>{{ 'cloud-sync.none' | translate }}</ion-label>
      <ion-radio color="secondary" slot="end" value="none"></ion-radio>
    </ion-item>
  </ion-radio-group>
</ion-content>
