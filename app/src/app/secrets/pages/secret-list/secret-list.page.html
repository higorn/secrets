<ion-header translucent>
  <ion-toolbar>
    <ion-title>{{ 'secrets.list.title' | translate }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="showMenu($event)">
        <ion-icon slot="icon-only" ios="ellipsis-horizontal" md="ellipsis-vertical"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar (ionInput)="search($event)"></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
  <ion-list lines="full">
    <ion-item-sliding *ngFor="let s of displaySecrets">
      <ion-item-options side="start">
        <ion-item-option color="light"><ion-icon slot="icon-only" name="ellipsis-vertical-outline"></ion-icon></ion-item-option>
        <ion-item-option color="light"><ion-icon slot="icon-only" name="copy-outline"></ion-icon></ion-item-option>
        <ion-item-option color="light"><ion-icon slot="icon-only" name="trash-outline"></ion-icon></ion-item-option>
      </ion-item-options>
      <ion-item [routerLink]="['/tabs/secrets', s.id]" detail>
        <ion-icon slot="start" [name]="getIcon(s.type)"></ion-icon>
        <ion-label>
          <ion-text>{{s.name}}
            <p class="small">{{getItemSubtitle(s)}}</p>
          </ion-text>
        </ion-label>
      </ion-item>
    </ion-item-sliding>
  </ion-list>
</ion-content>
